<template>
    <lightning-card title="My 5 Cases">
        <template lwc:if={foundCases}>
            <template for:each={caseList} for:item="Case">
                <ul key={Case.Id}>
                    <li>{Case.Origin}</li>
                    <li>{Case.Subject}</li>
                    <li>{Case.Description}</li>
                </ul>
            </template>
        </template>
    </lightning-card>

    <lightning-card title="My 5 Tasks">
        <template lwc:if={foundTasks}>
            <template for:each={taskList} for:item="Task">
                <ul key={Task.Id}>
                    <li>{Task.ActivityDate}</li>
                    <li>{Task.Subject}</li>
                    <li>{Task.Description}</li>
                </ul>
            </template>
        </template>
    </lightning-card>
</template>
